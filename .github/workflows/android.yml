name: Android CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check - Core
        run: cd packages/core && bun run typecheck

      - name: Type check - Storage
        run: cd packages/storage && bun run typecheck

      - name: Type check - Mobile
        run: cd apps/mobile && bun run typecheck

      - name: Lint - Core
        run: cd packages/core && bun run lint

      - name: Lint - Storage
        run: cd packages/storage && bun run lint

      - name: Lint - Mobile
        run: cd apps/mobile && bun run lint

      - name: Format check - Core
        run: cd packages/core && bun run format:check

      - name: Format check - Storage
        run: cd packages/storage && bun run format:check

      - name: Format check - Mobile
        run: cd apps/mobile && bun run format:check

      - name: Run tests - Core
        run: cd packages/core && bun run test

      - name: Run tests - Storage
        run: cd packages/storage && bun run test

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          echo "=== Installing dependencies in apps/mobile ==="
          cd apps/mobile
          npm install --legacy-peer-deps
          echo ""
          echo "=== Checking node_modules structure ==="
          echo "Contents of node_modules/@react-native:"
          ls -la node_modules/@react-native/ 2>/dev/null || echo "Directory not found"
          echo ""
          echo "Checking gradle-plugin location:"
          find node_modules -name "gradle-plugin" -type d 2>/dev/null | head -10
          echo ""
          echo "Checking react-native package:"
          ls -la node_modules/react-native/ 2>/dev/null | head -10

      - name: Debug - Verify gradle-plugin exists
        run: |
          echo "=== Full path check ==="
          cd apps/mobile
          if [ -d "node_modules/@react-native/gradle-plugin" ]; then
            echo "✅ gradle-plugin found at node_modules/@react-native/gradle-plugin"
            ls -la node_modules/@react-native/gradle-plugin/
          else
            echo "❌ gradle-plugin NOT found"
            echo "Searching for it..."
            find . -path "*/node_modules/*" -name "*gradle-plugin*" -type d 2>/dev/null
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x apps/mobile/android/gradlew

      - name: Build Debug APK with verbose logging
        run: |
          cd apps/mobile/android
          echo "=== Running Gradle build with info logging ==="
          ./gradlew assembleDebug --no-daemon --info 2>&1 | head -200

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: todo-list-debug-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Build Release APK
        if: success()
        run: |
          cd apps/mobile/android
          ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: todo-list-release-apk
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
