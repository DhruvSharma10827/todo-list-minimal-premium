name: Android CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check - Core
        run: cd packages/core && bun run typecheck

      - name: Type check - Storage
        run: cd packages/storage && bun run typecheck

      - name: Type check - Mobile
        run: cd apps/mobile && bun run typecheck

      - name: Lint - Core
        run: cd packages/core && bun run lint

      - name: Lint - Storage
        run: cd packages/storage && bun run lint

      - name: Lint - Mobile
        run: cd apps/mobile && bun run lint

      - name: Format check - Core
        run: cd packages/core && bun run format:check

      - name: Format check - Storage
        run: cd packages/storage && bun run format:check

      - name: Format check - Mobile
        run: cd apps/mobile && bun run format:check

      - name: Run tests - Core
        run: cd packages/core && bun run test

      - name: Run tests - Storage
        run: cd packages/storage && bun run test

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          echo "=== Installing ALL dependencies (root + workspaces) ==="
          npm install --legacy-peer-deps
          echo ""
          echo "=== Checking for gradle-plugin ==="
          echo "Root node_modules/@react-native:"
          ls -la node_modules/@react-native/ 2>/dev/null || echo "Not in root"
          echo ""
          echo "Checking apps/mobile:"
          ls -la apps/mobile/node_modules/@react-native/ 2>/dev/null || echo "Not in apps/mobile"

      - name: Verify gradle-plugin location
        id: plugin-check
        run: |
          echo "=== Finding gradle-plugin ==="
          GRADLE_PLUGIN=$(find . -path "*/node_modules/@react-native/gradle-plugin" -type d 2>/dev/null | head -1)
          if [ -n "$GRADLE_PLUGIN" ]; then
            echo "✅ Found at: $GRADLE_PLUGIN"
            echo "PLUGIN_PATH=$GRADLE_PLUGIN" >> $GITHUB_OUTPUT
            ls -la "$GRADLE_PLUGIN"
          else
            echo "❌ gradle-plugin not found anywhere!"
            find . -name "gradle-plugin" -type d 2>/dev/null
            exit 1
          fi

      - name: Update settings.gradle with correct path
        run: |
          PLUGIN_PATH="${{ steps.plugin-check.outputs.PLUGIN_PATH }}"
          echo "=== Updating settings.gradle to use: $PLUGIN_PATH ==="
          # Calculate relative path from android directory to gradle-plugin
          cd apps/mobile/android
          RELATIVE_PATH=$(realpath --relative-to=. "../../../$PLUGIN_PATH")
          echo "Relative path from android: $RELATIVE_PATH"

          # Create new settings.gradle
          cat > settings.gradle << 'SETTINGS_GRADLE'
          pluginManagement {
          SETTINGS_GRADLE
          echo "    includeBuild(\"../$RELATIVE_PATH\")" >> settings.gradle
          cat >> settings.gradle << 'SETTINGS_GRADLE'
              repositories {
                  gradlePluginPortal()
                  google()
                  mavenCentral()
              }
          }

          plugins {
              id("com.facebook.react.settings")
          }

          extensions.configure(com.facebook.react.ReactSettingsExtension){ ex ->
              ex.autolinkLibrariesFromCommand()
          }

          rootProject.name = 'TodoList'

          include ':app'
          SETTINGS_GRADLE

          echo "=== New settings.gradle ==="
          cat settings.gradle

      - name: Grant execute permission for gradlew
        run: chmod +x apps/mobile/android/gradlew

      - name: Build Debug APK
        run: |
          cd apps/mobile/android
          echo "=== Building Debug APK ==="
          ./gradlew assembleDebug --no-daemon 2>&1 | head -100

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: todo-list-debug-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Build Release APK
        run: |
          cd apps/mobile/android
          ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: todo-list-release-apk
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
